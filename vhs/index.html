<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rijt.net</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      font-family: 'Times New Roman', Times, serif;
      min-height: 100vh;
      color: #111;
    }

    /* Logo: top-left, fixed */
    #logo {
      position: fixed;
      top: 18px;
      left: 22px;
      width: 48px;
      height: 48px;
      z-index: 10;
    }

    #logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* Centered tool grid */
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 80px 24px;
    }

    .tool-list {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .tool-btn {
      display: inline-block;
      font-family: 'Times New Roman', Times, serif;
      font-size: 13px;
      letter-spacing: 0.06em;
      color: #111;
      text-decoration: none;
      border: 1px solid #111;
      padding: 5px 16px 4px;
      background: transparent;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
    }

    .tool-btn:hover {
      background: #111;
      color: #fff;
    }
  </style>
</head>
<body>

  <div id="logo">
    <!-- Replace logo.gif with your actual gif file -->
    <img src="logo.gif" alt="rijt.net" onerror="this.style.display='none'" />
  </div>

  <main>
    <nav class="tool-list">
      <a class="tool-btn" href="vhs/index.html">vhs converter</a>
      <!-- future tools go here -->
    </nav>
  </main>

</body>
</html>
